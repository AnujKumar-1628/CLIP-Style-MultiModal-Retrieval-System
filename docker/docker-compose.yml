name: clip-retrieval

services:
  api:
    image: clip-retrieval:${IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13.7}
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8001
      HF_HOME: /home/app/.cache/huggingface
    ports:
      - "${API_PORT:-8001}:8001"
    volumes:
      - ../artifacts:/app/artifacts
      - ../data:/app/data
      - ../data:/content/local_data/data:ro
      - ../experiments:/app/experiments
      - huggingface-cache:/home/app/.cache/huggingface
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    init: true
    restart: unless-stopped

volumes:
  huggingface-cache:
